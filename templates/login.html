<!DOCTYPE html>
<html>
<head>
    <title>FocusForge - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Patrick Hand', cursive; height:100vh; display:flex; justify-content:center; align-items:center; background:#87CEEB; }
        .login-box { background: rgba(255,255,255,0.2); padding:40px; border-radius:20px; text-align:center; }
        input { display:block; width:80%; margin:10px auto; padding:10px; border-radius:8px; border:none; }
        button { padding:10px 20px; border-radius:8px; border:none; background:#6a5acd; color:white; cursor:pointer; }
        .error { color:red; margin-top:10px; }
        .register-link { margin-top:15px; display:block; color:white; text-decoration:none; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Login</h2>

<form method="POST">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<p>Don't have account? <a href="/register">Register</a></p>
    <a href="{{ url_for('register') }}" class="register-link">Create an account</a>
</div>
</body>
</html>
